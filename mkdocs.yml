site_name: "Blockchain - The Skeptic's Guide"
repo_url: https://github.com/dmccreary/blockchain
site_url: https://dmccreary.github.io/blockchain/
site_description: "Blockchain: A Skeptic's Guide to Trust Technologies. An interactive intelligent textbook examining blockchain, certificate authorities, cost analysis, architecture tradeoffs, and cognitive biases in technology decisions."
site_author: Dan McCreary

nav:
  - Home: index.md
  - About: about.md
  - Course Description: course-description.md

  - Chapters:
    - Overview: chapters/index.md
    - 1. Trust and Digital Networks: chapters/01-trust-and-digital-networks/index.md
    - 2. Cryptographic Foundations: chapters/02-cryptographic-foundations/index.md
    - 3. Keys, Signatures, and Identity: chapters/03-keys-signatures-identity/index.md
    - 4. Certificate Authorities and PKI: chapters/04-certificate-authorities-pki/index.md
    - 5. Distributed Systems and Ledgers: chapters/05-distributed-systems-ledgers/index.md
    - 6. Nodes, Throughput, and Performance: chapters/06-nodes-throughput-performance/index.md
    - 7. Consensus Mechanisms: chapters/07-consensus-mechanisms/index.md
    - 8. Mining and Computational Economics: chapters/08-mining-computational-economics/index.md
    - 9. Smart Contracts and Tokens: chapters/09-smart-contracts-tokens/index.md
    - 10. Blockchain Types and Platforms: chapters/10-blockchain-types-platforms/index.md
    - 11. Governance and Scalability: chapters/11-governance-and-scalability/index.md
    - 12. Cost Analysis and TCO: chapters/12-cost-analysis-tco/index.md
    - 13. Architecture Tradeoff Analysis: chapters/13-architecture-tradeoff-analysis/index.md
    - 14. Risk Analysis and Quality Attributes: chapters/14-risk-analysis-quality-attributes/index.md
    - 15. Cognitive Bias in Technology: chapters/15-cognitive-bias-technology/index.md
    - 16. Evidence-Based Evaluation: chapters/16-evidence-based-evaluation/index.md
    - 17. Industry Case Studies: chapters/17-industry-case-studies/index.md
    - 18. Emerging Trust Technologies: chapters/18-emerging-trust-technologies/index.md
    - 19. Alternative Architectures: chapters/19-alternative-architectures-decisions/index.md
    - 20. Implementation and Capstone: chapters/20-implementation-capstone/index.md

  - MicroSims:
    - Graph Viewer: sims/graph-viewer/index.md

  - Learning Graph:
    - Introduction: learning-graph/index.md
    - Course Description Assessment: learning-graph/course-description-assessment.md
    - Concept Enumeration: learning-graph/concept-list.md
    - Graph Quality Analysis: learning-graph/quality-metrics.md
    - Concept Taxonomy: learning-graph/concept-taxonomy.md
    - Taxonomy Distribution Report: learning-graph/taxonomy-distribution.md
    - Mascot Test: learning-graph/mascot-test.md

  - Glossary: glossary.md
  - License: license.md
  - Contact: contact.md

theme:
  name: material
  palette:
    primary: 'blue grey'
    accent: 'deep orange'
  include_sidebar: true
  features:
    - content.code.copy
    - navigation.expand
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - toc.follow
    - navigation.top
    - navigation.footer
    - content.action.edit

plugins:
  - search
  - social

markdown_extensions:
  - md_in_html
  - attr_list
  - admonition
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      linenums: true
  - pymdownx.arithmatex:
      generic: true

extra_css:
  - css/extra.css
  - css/mascot.css

extra_javascript:
  - js/extra.js
  - js/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

# Watch these files for changes to trigger a rebuild
watch:
  - docs
  - mkdocs.yml

copyright: Copyright &copy; 2025 Dan McCreary. Licensed under <a href="license/">CC BY-NC-SA 4.0</a> for non-commercial use.

extra:
  # remove the "Made with MkDocs" in the footer
  generator: false

  # Used by search engines to find the intelligent textbook type
  schema: https://dmccreary.github.io/intelligent-textbooks/ns/textbook/v1
  textbook_name: "Blockchain: A Skeptic's Guide to Trust Technologies"
  textbook_version: "1.0"
