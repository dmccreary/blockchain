theme:
  name: material
  palette:
    primary: 'blue grey'
    accent: 'deep orange'
  include_sidebar: true
  features:
    - content.code.copy
    - navigation.expand
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - toc.follow
    - navigation.top
    - navigation.footer
    - content.action.edit

plugins:
  - search
  - social

markdown_extensions:
  - md_in_html
  - attr_list
  - admonition
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      linenums: true
  - pymdownx.arithmatex:
      generic: true

extra_css:
  - css/extra.css
  - css/mascot.css

extra_javascript:
  - js/extra.js
  - js/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

# Watch these files for changes to trigger a rebuild
watch:
  - docs
  - mkdocs.yml

copyright: Copyright &copy; 2025 Dan McCreary. Licensed under <a href="license/">CC BY-NC-SA 4.0</a> for non-commercial use.

extra:
  # remove the "Made with MkDocs" in the footer
  generator: false

  # Used by search engines to find the intelligent textbook type
  schema: https://dmccreary.github.io/intelligent-textbooks/ns/textbook/v1
  textbook_name: "Blockchain: A Skeptic's Guide to Trust Technologies"
  textbook_version: "1.0"
